<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="icono-app.png" />

    <title>Gestión Almacén | Descarga Directa</title>
    
    <meta name="description" content="Descarga la App nativa de Gestión de Almacén para Android." />
    <meta property="og:title" content="Gestión Almacén - Descarga la App" />

    <meta property="og:image" content="icono-app.png" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

    <style>
        :root {
          --primary-color: #7f52ff;
          --secondary-color: #00bbd4;
          --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
          font-family: "Poppins", sans-serif;
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: var(--bg-gradient);
          color: #fff;
        }

        .container {
          background: rgba(255, 255, 255, 0.1);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.2);
          padding: 40px;
          border-radius: 20px;
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
          max-width: 400px;
          width: 90%;
          text-align: center;
        }

        /* AJUSTE PARA QUE EL ICONO SE VEA GRANDE */
        .app-icon {
          width: 120px;         /* Aumentamos el tamaño del cuadro */
          height: 120px;
          background: #fff;
          border-radius: 25px;
          margin: 0 auto 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;     /* Recorta el exceso de la imagen */
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .app-icon img {
          width: 140%;          /* Hacemos la imagen más grande que el cuadro */
          height: 140%;         /* Esto elimina los bordes blancos de la imagen original */
          object-fit: cover;    /* Expande el logo para que llene todo el espacio */
        }

        h1 { font-weight: 600; margin-bottom: 10px; font-size: 1.8rem; }
        p { font-weight: 300; font-size: 0.95rem; opacity: 0.9; line-height: 1.6; margin-bottom: 30px; }

        .btn {
          display: inline-block;
          background: #fff;
          color: #764ba2;
          padding: 15px 35px;
          text-decoration: none;
          border-radius: 50px;
          font-weight: 600;
          transition: all 0.3s ease;
          box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
          transform: translateY(-3px);
          background: var(--secondary-color);
          color: #fff;
        }

        .version { margin-top: 25px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
<div class="container">
    <div class="app-icon">

        Optimiza tu inventario con nuestra solución móvil nativa. Rápida, segura
        y eficiente.
    </p>

    <div class="version">Versión 1.0.0 • Android 8.0+</div>
</div>
</body>
</html>
